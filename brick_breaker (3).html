  h1 {
    font-family: 'Baloo 2', cursive;
    font-weight: 800;
    color: var(--plum-deep);
    margin: 22px 0 6px 0;
    font-size: 32px;
    letter-spacing: 1px;
    text-shadow: 2px 2px 0 var(--yellow), -1px -1px 0 rgba(255,255,255,0.6);
    text-align: center;
    padding: 0 16px;
  }

  #subtitle {
    font-family: 'Quicksand', sans-serif;
    font-weight: 600;
    color: var(--plum);
    font-size: 14px;
    margin-bottom: 14px;
    opacity: 0.85;
  }

  #difficultyBar {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }

  .diffBtn {
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    font-size: 14px;
    padding: 8px 18px;
    border-radius: 999px;
    border: 2px solid var(--plum);
    background: var(--cream);
    color: var(--plum-deep);
    cursor: pointer;
    transition: transform 0.15s ease, background 0.15s ease, color 0.15s ease;
  }

  .diffBtn:hover {
    transform: translateY(-2px);
  }

  .diffBtn.active {
    background: var(--plum-deep);
    color: var(--cream);
    border-color: var(--plum-deep);
  }

<body>

<h1>ACM Brick Breaker</h1>
<div id="subtitle">an endless polaroid arcade</div>

<div id="difficultyBar">
  <button class="diffBtn" data-diff="easy">Easy</button>
  <button class="diffBtn active" data-diff="medium">Medium</button>
  <button class="diffBtn" data-diff="hard">Hard</button>
</div>

<div id="polaroidWrap">
  <canvas id="gameCanvas" width="300" height="310"></canvas>
</div>

<div id="info">
  <span><span class="label">Score</span><span id="score">0</span></span>
  <span><span class="label">Lives</span><span id="lives">3</span></span>
  <span id="multiplier">⚡ 2x</span>
</div>
<div id="hint">Move mouse to aim &nbsp;|&nbsp; click to lock direction &nbsp;|&nbsp; click again to launch</div>
<div id="status"></div>
<button id="restartBtn">Play Again</button>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// ---------- Difficulty presets ----------
const DIFFICULTIES = {
  easy:   { paddleWidth: 52, ballSpeed: 2.4, spawnInterval: 210, spawnCount: 1, maxBricks: 10, lives: 4 },
  medium: { paddleWidth: 42, ballSpeed: 3.0, spawnInterval: 150, spawnCount: 1, maxBricks: 14, lives: 3 },
  hard:   { paddleWidth: 32, ballSpeed: 3.8, spawnInterval: 95,  spawnCount: 2, maxBricks: 18, lives: 2 }
};
let currentDifficulty = "medium";

// ---------- Core state ----------
let score = 0;
let lives = 3;
let gameRunning = true;
let animationId = null;
let frameCount = 0;

let ballRadius = 6;
let ballSpeed = 3;
let x, y;
let dx = 0;
let dy = 0;

let gameState = "aiming"; // "aiming" -> "locked" -> "launched"
let hasStarted = false; // becomes true on the first launch; gates power dots & brick drip-feed
let aimAngle = -Math.PI / 2;
const MIN_ANGLE = -Math.PI + 0.2;
const MAX_ANGLE = -0.2;

let paddleHeight = 8;
let paddleWidth = 42;
let paddleX;

let rightPressed = false;
let leftPressed = false;

// ---------- Brick grid (pool of cells that fill up over time) ----------
const brickColumnCount = 5;
const brickRowCount = 6; // pool depth, not all filled at once
const brickWidth = 44;
const brickHeight = 15;
const brickPadding = 6;
const brickOffsetTop = 14;
const brickOffsetLeft = (300 - (brickColumnCount * brickWidth + (brickColumnCount - 1) * brickPadding)) / 2;

let bricks = [];
let spawnInterval = 150;
let spawnCount = 1;
let maxBricks = 14;

const rowColors = ["#F49A1A", "#F3C846", "#F0B33C", "#EFA92E", "#E8790B", "#F6D273"];

function buildEmptyGrid() {
  bricks = [];
  for (let c = 0; c < brickColumnCount; c++) {
    bricks[c] = [];
    for (let r = 0; r < brickRowCount; r++) {
      bricks[c][r] = { x: 0, y: 0, status: 0 };
    }
  }
}

function fillAllBricks() {
  for (let c = 0; c < brickColumnCount; c++) {
    for (let r = 0; r < brickRowCount; r++) {
      bricks[c][r].status = 1;
    }
  }
}

function countActiveBricks() {
  let n = 0;
  for (let c = 0; c < brickColumnCount; c++) {
    for (let r = 0; r < brickRowCount; r++) {
      if (bricks[c][r].status === 1) n++;
    }
  }
  return n;
}

const LOW_BRICK_THRESHOLD = 4;

function maybeSpawnBricks() {
  if (!hasStarted) return;
  let active = countActiveBricks();
  if (active > LOW_BRICK_THRESHOLD) return; // board is still full enough, no drip-feed yet
  if (frameCount % spawnInterval !== 0) return;
  let toSpawn = spawnCount;
  let guard = 0;
  while (toSpawn > 0 && active < maxBricks && guard < 100) {
    guard++;
    const c = Math.floor(Math.random() * brickColumnCount);
    const r = Math.floor(Math.random() * brickRowCount);
    if (bricks[c][r].status === 0) {
      bricks[c][r].status = 1;
      active++;
      toSpawn--;
    }
  }
}

// ---------- Enchanted power dot ----------
let powerDot = null;
let powerDotRadius = 9;
let scoreMultiplier = 1;
let multiplierTimeoutId = null;

function resetBallToPaddle() {
  x = paddleX + paddleWidth / 2;
  y = canvas.height - paddleHeight - ballRadius - 2;
  dx = 0;
  dy = 0;
  gameState = "aiming";
}

function initGame(diffKey) {
  currentDifficulty = diffKey;
  const d = DIFFICULTIES[diffKey];

  document.querySelectorAll(".diffBtn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.diff === diffKey);
  });

  score = 0;
  lives = d.lives;
  paddleWidth = d.paddleWidth;
  ballSpeed = d.ballSpeed;
  spawnInterval = d.spawnInterval;
  spawnCount = d.spawnCount;
  maxBricks = d.maxBricks;

  paddleX = (canvas.width - paddleWidth) / 2;
  rightPressed = false;
  leftPressed = false;

  buildEmptyGrid();
  fillAllBricks();

  hasStarted = false;
  powerDot = null;
  scoreMultiplier = 1;
  if (multiplierTimeoutId) { clearTimeout(multiplierTimeoutId); multiplierTimeoutId = null; }
  document.getElementById("multiplier").style.display = "none";

  document.getElementById("score").textContent = score;
  document.getElementById("lives").textContent = lives;
  document.getElementById("status").textContent = "";
  document.getElementById("restartBtn").style.display = "none";

  frameCount = 0;
  resetBallToPaddle();

  gameRunning = true;
  if (animationId) cancelAnimationFrame(animationId);
  draw();
}

document.addEventListener("keydown", keyDownHandler);
document.addEventListener("keyup", keyUpHandler);
canvas.addEventListener("mousemove", mouseMoveHandler);
canvas.addEventListener("click", mouseClickHandler);

document.querySelectorAll(".diffBtn").forEach(btn => {
  btn.addEventListener("click", () => initGame(btn.dataset.diff));
});

function keyDownHandler(e) {
  if (e.key === "Right" || e.key === "ArrowRight") {
    rightPressed = true;
  } else if (e.key === "Left" || e.key === "ArrowLeft") {
    leftPressed = true;
  }
}

function keyUpHandler(e) {
  if (e.key === "Right" || e.key === "ArrowRight") {
    rightPressed = false;
  } else if (e.key === "Left" || e.key === "ArrowLeft") {
    leftPressed = false;
  }
}

function getCanvasMousePos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return {
    mx: (e.clientX - rect.left) * scaleX,
    my: (e.clientY - rect.top) * scaleY
  };
}

function mouseMoveHandler(e) {
  if (gameState !== "aiming") return;
  const { mx, my } = getCanvasMousePos(e);
  let angle = Math.atan2(my - y, mx - x);
  if (angle > 0) {
    angle = (mx - x >= 0) ? MAX_ANGLE : MIN_ANGLE;
  } else if (angle > MAX_ANGLE) {
    angle = MAX_ANGLE;
  } else if (angle < MIN_ANGLE) {
    angle = MIN_ANGLE;
  }
  aimAngle = angle;
}

function mouseClickHandler() {
  if (!gameRunning) return;
  if (gameState === "aiming") {
    gameState = "locked";
  } else if (gameState === "locked") {
    dx = ballSpeed * Math.cos(aimAngle);
    dy = ballSpeed * Math.sin(aimAngle);
    gameState = "launched";
    hasStarted = true;
  }
}

function collisionDetection() {
  for (let c = 0; c < brickColumnCount; c++) {
    for (let r = 0; r < brickRowCount; r++) {
      let b = bricks[c][r];
      if (b.status === 1) {
        if (
          x + ballRadius > b.x &&
          x - ballRadius < b.x + brickWidth &&
          y + ballRadius > b.y &&
          y - ballRadius < b.y + brickHeight
        ) {
          let overlapLeft = (x + ballRadius) - b.x;
          let overlapRight = (b.x + brickWidth) - (x - ballRadius);
          let overlapTop = (y + ballRadius) - b.y;
          let overlapBottom = (b.y + brickHeight) - (y - ballRadius);

          let minOverlapX = Math.min(overlapLeft, overlapRight);
          let minOverlapY = Math.min(overlapTop, overlapBottom);

          if (minOverlapX < minOverlapY) {
            dx = -dx;
          } else {
            dy = -dy;
          }

          b.status = 0;
          score += 1 * scoreMultiplier;
          document.getElementById("score").textContent = score;
          return;
        }
      }
    }
  }
}

function drawBall() {
  ctx.beginPath();
  ctx.arc(x, y, ballRadius, 0, Math.PI * 2);
  ctx.fillStyle = "#4B3A5A";
  ctx.fill();
  ctx.closePath();
}

function drawPaddle() {
  ctx.beginPath();
  const py = canvas.height - paddleHeight;
  const radius = 4;
  ctx.moveTo(paddleX + radius, py);
  ctx.arcTo(paddleX + paddleWidth, py, paddleX + paddleWidth, py + paddleHeight, radius);
  ctx.arcTo(paddleX + paddleWidth, py + paddleHeight, paddleX, py + paddleHeight, radius);
  ctx.arcTo(paddleX, py + paddleHeight, paddleX, py, radius);
  ctx.arcTo(paddleX, py, paddleX + paddleWidth, py, radius);
  ctx.closePath();
  ctx.fillStyle = "#E8790B";
  ctx.fill();
}

function drawBricks() {
  for (let c = 0; c < brickColumnCount; c++) {
    for (let r = 0; r < brickRowCount; r++) {
      if (bricks[c][r].status === 1) {
        let brickX = c * (brickWidth + brickPadding) + brickOffsetLeft;
        let brickY = r * (brickHeight + brickPadding) + brickOffsetTop;
        bricks[c][r].x = brickX;
        bricks[c][r].y = brickY;
        ctx.beginPath();
        ctx.rect(brickX, brickY, brickWidth, brickHeight);
        ctx.fillStyle = rowColors[r % rowColors.length];
        ctx.fill();
        ctx.closePath();
      }
    }
  }
}

function drawAimLine() {
  if (gameState !== "aiming" && gameState !== "locked") return;
  const length = 34;
  const ex = x + Math.cos(aimAngle) * length;
  const ey = y + Math.sin(aimAngle) * length;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(ex, ey);
  ctx.strokeStyle = gameState === "locked" ? "#E8790B" : "rgba(75,58,90,0.5)";
  ctx.lineWidth = 2;
  ctx.setLineDash(gameState === "locked" ? [] : [4, 3]);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.beginPath();
  ctx.arc(ex, ey, 3, 0, Math.PI * 2);
  ctx.fillStyle = gameState === "locked" ? "#E8790B" : "#4B3A5A";
  ctx.fill();
}

function drawPowerDot() {
  if (!powerDot) return;
  ctx.beginPath();
  ctx.arc(powerDot.x, powerDot.y, powerDotRadius, 0, Math.PI * 2);
  ctx.fillStyle = "#E63946";
  ctx.shadowColor = "#E63946";
  ctx.shadowBlur = 10;
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.closePath();
}

function maybeSpawnPowerDot() {
  if (!hasStarted) return;
  if (powerDot) return;
  if (frameCount % 320 !== 0) return;
  if (Math.random() > 0.55) return;

  const minX = 24;
  const maxX = canvas.width - 24;
  const minY = brickOffsetTop + 3 * (brickHeight + brickPadding);
  const maxY = canvas.height - 50;

  powerDot = {
    x: minX + Math.random() * (maxX - minX),
    y: minY + Math.random() * (maxY - minY)
  };
}

function checkPowerDotCollision() {
  if (!powerDot) return;
  const distX = x - powerDot.x;
  const distY = y - powerDot.y;
  const dist = Math.sqrt(distX * distX + distY * distY);
  if (dist < ballRadius + powerDotRadius) {
    activateMultiplier();
    powerDot = null;
  }
}

function activateMultiplier() {
  scoreMultiplier = 2;
  document.getElementById("multiplier").style.display = "inline";
  if (multiplierTimeoutId) clearTimeout(multiplierTimeoutId);
  multiplierTimeoutId = setTimeout(() => {
    scoreMultiplier = 1;
    document.getElementById("multiplier").style.display = "none";
    multiplierTimeoutId = null;
  }, 7000);
}

function draw() {
  if (!gameRunning) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#FBF3DE";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (rightPressed && paddleX < canvas.width - paddleWidth) {
    paddleX += 4;
  } else if (leftPressed && paddleX > 0) {
    paddleX -= 4;
  }

  if (gameState !== "launched") {
    x = paddleX + paddleWidth / 2;
    y = canvas.height - paddleHeight - ballRadius - 2;
  }

  drawBricks();
  drawPowerDot();
  drawBall();
  drawPaddle();
  drawAimLine();

  frameCount++;
  maybeSpawnBricks();
  maybeSpawnPowerDot();

  if (gameState === "launched") {
    collisionDetection();
    checkPowerDotCollision();

    if (x + dx > canvas.width - ballRadius || x + dx < ballRadius) {
      dx = -dx;
    }
    if (y + dy < ballRadius) {
      dy = -dy;
    } else if (y + dy > canvas.height - ballRadius) {
      if (x > paddleX && x < paddleX + paddleWidth) {
        dy = -dy;
      } else {
        lives--;
        document.getElementById("lives").textContent = lives;
        if (lives <= 0) {
          endGame();
          return;
        } else {
          resetBallToPaddle();
        }
      }
    }

    x += dx;
    y += dy;
  }

  animationId = requestAnimationFrame(draw);
}

function endGame() {
  gameRunning = false;
  if (animationId) cancelAnimationFrame(animationId);
  document.getElementById("status").textContent = "💀 GAME OVER 💀";
  document.getElementById("restartBtn").style.display = "inline-block";
}

document.getElementById("restartBtn").addEventListener("click", () => {
  initGame(currentDifficulty);
});

initGame("medium");
</script>
</body>
</html>
